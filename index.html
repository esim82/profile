<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="style.css" />
</head>
<style>
    * {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #fff;
}

/* Hero 영역 */
.hero {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    max-height: 100vh;
    overflow: hidden;
    background-color: #000;
}

/* 배경 이미지 */
.hero-bg {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: center center;
}

/* 텍스트 가독성용 오버레이 */
.hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.25);
}

/* 중앙 텍스트 */
.hero-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    z-index: 2;
}

.hero-content h1 {
    margin: 0;
    font-size: clamp(2rem, 5vw, 4.5rem);
    font-weight: 700;
    letter-spacing: 0.04em;
}

.hero-content p {
    margin-top: 12px;
    font-size: clamp(1rem, 2vw, 1.5rem);
    font-weight: 300;
}

/* 본문 */
.content {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    color: #111;
    background: #fff;
}

.content h2 {
    margin-top: 0;
    color: #111;
}

.content p {
    line-height: 1.7;
    color: #333;
}

/* 모바일 대응 */
@media (max-width: 768px) {
    .hero {
        aspect-ratio: 16 / 9;
        width: 100%;
    }

    .hero-content {
        padding: 16px;
    }
}
</style>
<body>
    <section class="hero">
        <img src="background.jpg" alt="background image" class="hero-bg" />

        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h1>Sim EunJi</h1>
            <p>Ph.D. in Energy Science</p>
        </div>
    </section>

    <main class="content">
        <section>
            <h2>심은지</h2>
             <p class="sub">Ph.D in Energy Science</p>
             <a target="_blank" href="https://instagram.com/esim.kr">Instagram 🎓️</a>
            <a target="_blank" href="https://instagram.com/kim.coldbrew">Instagram 🐱</a>
            <a target="_blank" href="https://blog.naver.com/plantedz">Blog</a>
            <a target="_blank" href="https://scholar.google.com/citations?user=pEfDP8oAAAAJ&hl=ko">Publications</a>
        </section>
    </main>
</body>
</html>
