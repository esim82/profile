<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta property="og:type" content="website">
    <meta property="og:title" content="심은지">
    <meta property="og:description" content="프로필 링크">
    <meta property="og:image" content="preview.jpg">
    <title>Eunji Sim</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        * {
            font-family: "Pretendard",serif;
        }
        body {
			width: 100%;
            height: auto;
            background-image: url('background.jpg');
            background-size: cover;
			background-repeat: no-repeat;
			background-color: #363636;
        }
        .wrap{
            width: 300px;
            margin: 0px auto 0px auto;
			position: absolute;
			left: 50%;
			top: 51%;
			transform: translate(-50%, -49%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .profile{
            width: 150px;
            height: 150px;
            border-radius: 100%;
            border : 2px solid white;
            background-image: url('Sim.jpg');
            background-color: #dbd7f7;
            background-position: center;
            background-size: cover;
        }
        .main {
            color: white;
            font-size: 20px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .sub{
            margin-top: 0px;
            color: white;
            font-size: 14px;
        }
        .wrap > a{
            width: 300px;
            height: 50px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 3px 3px 5px 0px black;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
            color: #363636;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }
        .wrap > a:hover{
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="profile"></div>
        <h1 class="main">심은지 | EUNJI SIM</h1>
 	<p class="sub">Ph.D in Energy Science</p>
        <a target="_blank" href="https://instagram.com/esim.kr">Instagram 🎓</a>
        <a target="_blank" href="https://instagram.com/kim.coldbrew">Instagram 🐱</a>
        <a target="_blank" href="https://blog.naver.com/plantedz">Blog</a>
        <a target="_blank" href="https://scholar.google.com/citations?user=pEfDP8oAAAAJ&hl=ko">Publications</a>
    </div>


</body>
</html>
